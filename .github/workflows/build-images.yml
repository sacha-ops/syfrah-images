name: Build Images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      images:
        description: 'Images to build (comma-separated or "all")'
        default: 'all'
        type: string
  schedule:
    - cron: '0 4 1 * *'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [alpine-3.20]
    steps:
      - uses: actions/checkout@v4

      - name: Check if image should be built
        id: check
        run: |
          INPUT="${{ github.event.inputs.images || 'all' }}"
          if [ "$INPUT" = "all" ] || echo "$INPUT" | grep -q "${{ matrix.image }}"; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install tools
        if: steps.check.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils jq skopeo

      - name: Build VM image
        if: steps.check.outputs.skip != 'true'
        run: |
          export OUTPUT_DIR="${GITHUB_WORKSPACE}/output"
          bash images/${{ matrix.image }}/build.sh

      - name: Build container image
        if: steps.check.outputs.skip != 'true'
        run: |
          export OUTPUT_DIR="${GITHUB_WORKSPACE}/output"
          if [ -f "images/${{ matrix.image }}/build-container.sh" ]; then
            cd "images/${{ matrix.image }}"
            bash build-container.sh
            mv output/*-oci.tar.gz "$OUTPUT_DIR/" || true
          else
            echo "No container build script for ${{ matrix.image }}, skipping"
          fi

      - name: Verify artifacts
        if: steps.check.outputs.skip != 'true'
        run: |
          OUTPUT_DIR="${GITHUB_WORKSPACE}/output"
          test -f "$OUTPUT_DIR/${{ matrix.image }}.raw.gz"
          gunzip -t "$OUTPUT_DIR/${{ matrix.image }}.raw.gz"
          echo "VM artifact verified: ${{ matrix.image }}.raw.gz ($(du -h "$OUTPUT_DIR/${{ matrix.image }}.raw.gz" | cut -f1))"
          if [ -f "$OUTPUT_DIR/${{ matrix.image }}-oci.tar.gz" ]; then
            gunzip -t "$OUTPUT_DIR/${{ matrix.image }}-oci.tar.gz"
            echo "Container artifact verified: ${{ matrix.image }}-oci.tar.gz ($(du -h "$OUTPUT_DIR/${{ matrix.image }}-oci.tar.gz" | cut -f1))"
          fi

      - uses: actions/upload-artifact@v4
        if: steps.check.outputs.skip != 'true'
        with:
          name: ${{ matrix.image }}
          path: |
            output/${{ matrix.image }}.raw.gz
            output/${{ matrix.image }}-oci.tar.gz
          retention-days: 7

  kernel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build kernel
        run: |
          export OUTPUT_DIR="${GITHUB_WORKSPACE}/output"
          bash kernel/build.sh

      - name: Verify kernel
        run: |
          OUTPUT_DIR="${GITHUB_WORKSPACE}/output"
          test -f "$OUTPUT_DIR/vmlinux.gz"
          gunzip -t "$OUTPUT_DIR/vmlinux.gz"
          gunzip -k -f "$OUTPUT_DIR/vmlinux.gz"
          file "$OUTPUT_DIR/vmlinux"
          echo "Kernel artifact verified: vmlinux.gz ($(du -h "$OUTPUT_DIR/vmlinux.gz" | cut -f1))"

      - uses: actions/upload-artifact@v4
        with:
          name: kernel
          path: output/vmlinux.gz
          retention-days: 7

  publish:
    needs: [build, kernel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          merge-multiple: true

      - name: List artifacts
        run: ls -lh output/

      - name: Generate catalog
        run: |
          TAG="images-v${{ github.run_number }}"
          bash scripts/generate-catalog.sh output "$TAG"

      - name: Generate checksums
        run: |
          cd output
          sha256sum *.raw.gz vmlinux.gz catalog.json > SHA256SUMS.txt
          if ls *-oci.tar.gz 1>/dev/null 2>&1; then
            sha256sum *-oci.tar.gz >> SHA256SUMS.txt
          fi
          cat SHA256SUMS.txt

      - name: Validate catalog
        run: |
          jq '.' output/catalog.json > /dev/null
          echo "catalog.json is valid JSON"

          for file in $(jq -r '.images[].file' output/catalog.json); do
            test -f "output/$file" || { echo "ERROR: $file not found"; exit 1; }
            echo "  OK: $file exists"
          done

          for row in $(jq -r '.images[] | "\(.file):\(.sha256)"' output/catalog.json); do
            FILE="${row%%:*}"
            EXPECTED="${row#*:}"
            ACTUAL=$(gunzip -c "output/$FILE" | sha256sum | awk '{print $1}')
            if [ "$EXPECTED" != "$ACTUAL" ]; then
              echo "ERROR: SHA256 mismatch for $FILE"
              echo "  Expected: $EXPECTED"
              echo "  Actual:   $ACTUAL"
              exit 1
            fi
            echo "  OK: $FILE SHA256 matches"
          done

          # Validate container files if present
          for row in $(jq -r '.images[] | select(.container_file != null) | "\(.container_file):\(.container_sha256)"' output/catalog.json); do
            FILE="${row%%:*}"
            EXPECTED="${row#*:}"
            test -f "output/$FILE" || { echo "ERROR: container file $FILE not found"; exit 1; }
            ACTUAL=$(gunzip -c "output/$FILE" | sha256sum | awk '{print $1}')
            if [ "$EXPECTED" != "$ACTUAL" ]; then
              echo "ERROR: container SHA256 mismatch for $FILE"
              exit 1
            fi
            echo "  OK: $FILE container SHA256 matches"
          done

          echo "Catalog validation passed"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="images-v${{ github.run_number }}"
          BODY=$(cat <<BODY_EOF
          Pre-built VM images and kernel for Syfrah compute layer.

          **Images:**
          $(jq -r '.images[] | "- \(.name) (\(.arch), \(.size_mb) MB, cloud-init: \(.cloud_init))"' output/catalog.json)

          **Kernel:** $(jq -r '.kernel.version' output/catalog.json)

          **Usage:**
          \`\`\`
          syfrah compute image pull alpine-3.20
          \`\`\`
          BODY_EOF
          )

          ASSETS=(output/*.raw.gz output/vmlinux.gz output/catalog.json output/SHA256SUMS.txt)
          if ls output/*-oci.tar.gz 1>/dev/null 2>&1; then
            ASSETS+=(output/*-oci.tar.gz)
          fi

          gh release create "$TAG" \
            --title "Syfrah Images $TAG" \
            --notes "$BODY" \
            "${ASSETS[@]}"
